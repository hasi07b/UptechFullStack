<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab task 4</title>
</head>

<body>
    <h2>Task4</h2>
    <p>1. Count how many users are enrolled in each course using only for loops. 2. Display each course
        with the number of students enrolled.3. Print the most popular course with the highest number
        of students.</p>
    <script>
        const users = [
            { name: "Alice", courses: ["Math", "Science", "English"] },
            { name: "Bob", courses: ["Math", "Art"] },
            { name: "Charlie", courses: ["Science", "Math", "History"] },
            { name: "David", courses: ["Math", "English"] },
            { name: "Eve", courses: ["Art", "Science"] }
        ];

        // 1. Count users in each course
        let course = {};

        for (let i = 0; i < users.length; i++) {
            for (let j = 0; j < users[i].courses.length; j++) {
                let subj = users[i].courses[j];

                if (course[subj]) {
                    course[subj]++;
                } else {
                    course[subj] = 1;
                }
            }
        }

        console.log(course);


        // 2. Display each course with number of students
        for (let key in course) {   // ✅ courses → course
            console.log(key + " : " + course[key]);
        }


        // 3. Most popular course
        let maxCourseEnroll = "";
        let maxCountStudent = 0;

        for (let key in course) {   // ✅ courseCount → course
            if (course[key] > maxCountStudent) {
                maxCountStudent = course[key];
                maxCourseEnroll = key;
            }
        }

        console.log("Most Popular Course: " + maxCourseEnroll + " (" + maxCountStudent + " students)");
    </script>
</body>

</html>
