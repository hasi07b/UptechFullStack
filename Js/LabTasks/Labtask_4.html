<!DOCTYPE html>

<body>
    <h1>Lab task 4</h1>
    <script>
        // 1. Switch Statement
        // Write a function that takes a day number (1-7) as input and returns the name of the day. Use
        // a switch statement to return the correct day name based on the input.

        // let days = prompt("Enter day number"); //if you want to get value from user
        let days = "5"; // case value string mai ha es lyay hmai variable mai "" use krna pr rha ha 
        switch (days) {
            case "1":
                console.log("Monday");
                break;
            case "2":
                console.log("Tuesday");
                break;
            case "3":
                console.log("Wednesday");
                break;
            case "4":
                console.log("Thursday");
                break;
            case "5":
                console.log("Friday");
                break;
            case "6":
                console.log("Saturday");
                break;
            case "7":
                console.log("Sunday");
                break;
            default:
                console.log("Invalid day number");
        }

        // 2. Write a function that prints numbers from 1 to 10 using a while loop.

        let a = 1;
        while (a <= 10) {
            console.log(a)
            a++;
        }

        // 3. Write a function that prints numbers from 10 to 1 using a do while loop.
        let b = 10;
        do {
            console.log("Reverse values " + b);
            b--;               // increment loop ke andar
        } while (b >= 1);
    </script>
</body>
