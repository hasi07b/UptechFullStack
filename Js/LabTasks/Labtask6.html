<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-blue-50 to-gray-100 min-h-screen p-6">

    <div class="max-w-6xl mx-auto">

        <!-- Header -->
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">User Management System</h1>

        <!-- Search -->
        <div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <input type="text" id="searchInput" placeholder="Search users..."
                class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200 w-full md:w-1/2">
        </div>

        <!-- Form Card -->
        <div class="bg-white/80 backdrop-blur-lg border border-gray-200 p-6 rounded-2xl shadow-xl mb-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Add New User</h2>

            <form id="userForm" class="grid md:grid-cols-2 gap-4">

                <input type="text" id="firstName" placeholder="First Name"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />

                <input type="text" id="lastName" placeholder="Last Name"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />

                <input type="email" id="email" placeholder="Email"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />

                <input type="text" id="phone" placeholder="Phone"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />

                <div class="md:col-span-2 flex justify-between">
                    <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg shadow-md transition duration-200">
                        Save User
                    </button>
                    <button type="button" id="resetForm"
                        class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg shadow-md transition duration-200">
                        Reset Form
                    </button>
                </div>
            </form>
        </div>

        <!-- Message -->
        <div id="message"
            class="hidden mb-6 px-4 py-3 rounded-lg bg-green-100 text-green-700 font-medium shadow transition-all">
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="hidden text-center mb-4">
            <div
                class="loader border-4 border-indigo-400 border-t-transparent rounded-full w-12 h-12 mx-auto animate-spin">
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white/90 backdrop-blur-lg border border-gray-200 rounded-2xl shadow-xl overflow-hidden">
            <div class="p-4 border-b bg-gray-50">
                <h2 class="text-xl font-semibold text-gray-700">User List</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100 text-gray-600 text-sm uppercase tracking-wider">
                        <tr>
                            <th class="p-3">ID</th>
                            <th class="p-3">First Name</th>
                            <th class="p-3">Last Name</th>
                            <th class="p-3">Email</th>
                            <th class="p-3">Phone</th>
                            <th class="p-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTable" class="text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative">
            <h2 class="text-xl font-semibold mb-4">Edit User</h2>
            <form id="editForm" class="grid gap-4">
                <input type="text" id="editFirstName" placeholder="First Name"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />
                <input type="text" id="editLastName" placeholder="Last Name"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />
                <input type="email" id="editEmail" placeholder="Email"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />
                <input type="text" id="editPhone" placeholder="Phone"
                    class="p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-500 outline-none transition duration-200"
                    required />
                <div class="flex justify-between mt-4">
                    <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg shadow-md transition duration-200">
                        Update
                    </button>
                    <button type="button" id="closeModal"
                        class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg shadow-md transition duration-200">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .loader {
            border-width: 4px;
            border-top-width: 4px;
            border-color: #6366f1 #6366f1 #6366f1 transparent;
        }
    </style>

    <script>
        const API_URL = "https://dummyjson.com/users";

        const userTable = document.getElementById("userTable");
        const form = document.getElementById("userForm");
        const resetBtn = document.getElementById("resetForm");
        const message = document.getElementById("message");
        const searchInput = document.getElementById("searchInput");
        const loading = document.getElementById("loading");

        const editModal = document.getElementById("editModal");
        const editForm = document.getElementById("editForm");
        let editUserId = null;

        let users = [];          // Current users (modified)
        let originalUsers = [];  // Original API users

        // Show message
        function showMessage(text, color = "green") {
            message.textContent = text;
            message.className = `px-4 py-3 rounded-lg bg-${color}-100 text-${color}-700 font-medium shadow`;
            message.classList.remove("hidden");
            setTimeout(() => message.classList.add("hidden"), 3000);
        }

        // Show loading
        function showLoading(show) {
            loading.classList.toggle("hidden", !show);
        }

        // Fetch users from API
        async function fetchUsers() {
            try {
                showLoading(true);
                const res = await fetch(API_URL);
                const data = await res.json();
                users = data.users;
                originalUsers = [...data.users]; // save original
                renderUsers(users);
            } catch {
                showMessage("Failed to fetch users", "red");
            } finally {
                showLoading(false);
            }
        }

        // Render user table
        function renderUsers(list) {
            userTable.innerHTML = "";
            list.forEach(user => {
                const row = document.createElement("tr");
                row.className = "border-t hover:bg-gray-50 transition";
                row.innerHTML = `
                <td class="p-3">${user.id}</td>
                <td class="p-3 font-medium">${user.firstName}</td>
                <td class="p-3">${user.lastName}</td>
                <td class="p-3 text-indigo-600">${user.email}</td>
                <td class="p-3">${user.phone}</td>
                <td class="p-3 text-center space-x-2">
                    <button class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg shadow" onclick="openEditModal(${user.id})">Edit</button>
                    <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg shadow" onclick="deleteUser(${user.id})">Delete</button>
                </td>
            `;
                userTable.appendChild(row);
            });
        }

        // Add User
        form.addEventListener("submit", async e => {
            e.preventDefault();
            const newUser = {
                firstName: document.getElementById("firstName").value,
                lastName: document.getElementById("lastName").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value
            };
            try {
                showLoading(true);
                const res = await fetch(`${API_URL}/add`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(newUser)
                });
                const created = await res.json();
                users.push(created);
                originalUsers.push(created); // add to original too
                renderUsers(users);
                form.reset();
                searchInput.value = "";
                showMessage("User added successfully");
            } catch {
                showMessage("Failed to add user", "red");
            } finally {
                showLoading(false);
            }
        });

        // Reset button
        resetBtn.addEventListener("click", () => {
            form.reset();           // clear form fields
            searchInput.value = "";  // clear search input
            users = [];             // remove all users
            renderUsers(users);     // clear table
            showMessage("All users deleted and form reset", "red");
        });

        // Open Edit Modal
        window.openEditModal = (id) => {
            const user = users.find(u => u.id === id);
            document.getElementById("editFirstName").value = user.firstName;
            document.getElementById("editLastName").value = user.lastName;
            document.getElementById("editEmail").value = user.email;
            document.getElementById("editPhone").value = user.phone;
            editUserId = id;
            editModal.classList.remove("hidden");
        };

        // Close modal
        document.getElementById("closeModal").addEventListener("click", () => {
            editModal.classList.add("hidden");
            editUserId = null;
        });

        // Update User
        editForm.addEventListener("submit", async e => {
            e.preventDefault();
            if (!editUserId) return;
            const updatedUser = {
                firstName: document.getElementById("editFirstName").value,
                lastName: document.getElementById("editLastName").value,
                email: document.getElementById("editEmail").value,
                phone: document.getElementById("editPhone").value
            };
            try {
                showLoading(true);
                const res = await fetch(`${API_URL}/${editUserId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedUser)
                });
                const data = await res.json();
                users = users.map(u => u.id === editUserId ? data : u);
                originalUsers = originalUsers.map(u => u.id === editUserId ? data : u);
                renderUsers(users);
                editModal.classList.add("hidden");
                showMessage("User updated successfully");
            } catch {
                showMessage("Failed to update user", "red");
            } finally {
                showLoading(false);
            }
        });

        // Delete User
        window.deleteUser = async id => {
            if (!confirm("Are you sure you want to delete this user?")) return;
            try {
                showLoading(true);
                await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                users = users.filter(u => u.id !== id);
                originalUsers = originalUsers.filter(u => u.id !== id);
                renderUsers(users);
                showMessage("User deleted successfully");
            } catch {
                showMessage("Failed to delete user", "red");
            } finally {
                showLoading(false);
            }
        };

        // Search Users
        searchInput.addEventListener("input", async e => {
            const query = e.target.value.trim();
            if (!query) return renderUsers(users);
            try {
                showLoading(true);
                const res = await fetch(`${API_URL}/search?q=${query}`);
                const data = await res.json();
                renderUsers(data.users);
            } catch {
                showMessage("Search failed", "red");
            } finally {
                showLoading(false);
            }
        });

        // Initial fetch
        fetchUsers();
    </script>
</body>

</html>
