<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Lab task 2</title>
</head>

<body>

    <h2>Open Console </h2>

    <script>

        // Part 1: Variables & Data Types

        // Task 1: Student Introduction
        // Create variables for name, age, isStudent and print a sentence

        let name = "Hassan";
        let age = 20;
        let isStudent = true;

        console.log("My name is " + name + ". I am " + age + " years old. Student: " + isStudent);


        // Task 2: Data Type Checker
        // Create variables of types: String, Number, Boolean, Undefined, Null
        // Print their types

        let str = "Hello";
        let num = 100;
        let bool = false;
        let undef;
        let empty = null;

        console.log(typeof str);
        console.log(typeof num);
        console.log(typeof bool);
        console.log(typeof undef);
        console.log(typeof empty);


        // Task 3: Simple Calculator
        // Create two numbers and print addition, subtraction, multiplication, division

        let num1 = 10;
        let num2 = 5;

        console.log("Addition: " + (num1 + num2));
        console.log("Subtraction: " + (num1 - num2));
        console.log("Multiplication: " + (num1 * num2));
        console.log("Division: " + (num1 / num2));


        // Task 4: Temperature Converter
        // Convert Celsius to Fahrenheit using F = (C × 9/5) + 32

        let celsius = 25;
        let fahrenheit = (celsius * 9 / 5) + 32;

        console.log("Celsius: " + celsius);
        console.log("Fahrenheit: " + fahrenheit);


        // ==========================
        // Part 2: Conditions
        // ==========================

        // Task 5: Even or Odd
        // Check if number is even or odd

        let number = 7;

        if (number % 2 === 0) {
            console.log("Even");
        } else {
            console.log("Odd");
        }


        // Task 6: Grade Checker
        // Assign grade based on marks

        let marks = 85;

        if (marks >= 90) {
            console.log("Grade: A");
        } else if (marks >= 80) {
            console.log("Grade: B");
        } else if (marks >= 70) {
            console.log("Grade: C");
        } else if (marks >= 60) {
            console.log("Grade: D");
        } else {
            console.log("Grade: Fail");
        }


        // Task 7: Age Eligibility
        // Check if person can vote

        let personAge = 17;

        if (personAge >= 18) {
            console.log("You can vote");
        } else {
            console.log("You cannot vote");
        }


        // ==========================
        // Part 3: Loops
        // ==========================

        // Task 8: Print Numbers 1–10 using for loop

        for (let i = 1; i <= 10; i++) {
            console.log(i);
        }


        // Task 9: Multiplication Table
        // Print table of a number up to 10

        let tableNumber = 5;

        for (let i = 1; i <= 10; i++) {
            console.log(tableNumber + " x " + i + " = " + (tableNumber * i));
        }

    </script>

</body>

</html>
