        let inputTag = document.createElement("input")
        inputTag.placeholder = "add task";
        container.appendChild(inputTag)


        var btn = document.createElement("button")
        btn.innerText = "Add"
        container.appendChild(btn)

        let hV = 0; // bahir initiaze krwaya ta k yay globalywork kray local main icr.. nhi ho ga

        // Method 1:
        // btn fucntionality 
        btn.addEventListener("click", () => {

            //if input empty ho ga to kuch add nhi ho ga esay opr rakhna prta ha otherise kam ni krta
            let inputValue = inputTag.value;
            if (inputValue.trim() === "") {
                return;
            };

            hV++;   // incrementing value
            let heading2 = document.createElement("h3");
            heading2.innerHTML = "Task " + hV;
            container.appendChild(heading2);

            let para2 = document.createElement("p")
            para2.setAttribute("class", "pp")
            para2.innerText = inputValue;
            container.appendChild(para2)

            let deletBtn = document.createElement("button")
            deletBtn.setAttribute("id", "del");
            deletBtn.innerText = "Delete"
            container.appendChild(deletBtn)
            deletBtn.addEventListener("click", () => {
                heading2.remove();
                para2.remove();
                deletBtn.remove()


            })
            inputTag.value = "";
            inputTag.focus();


        })
